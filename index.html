<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="点検管理">
<title>カーメンテナンス点検</title>
<style>
:root{
  --bg:#0e1015; --surface:#181b23; --surface2:#20242f; --surface3:#2a2f3d;
  --border:#2c3140; --accent:#4f7ef8;
  --green:#30c85e; --yellow:#f5a623; --red:#f5554a; --blue:#42b8f5; --purple:#a78bfa;
  --text:#e8ecf3; --muted:#7a8499;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{overscroll-behavior-y:none;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Hiragino Sans',sans-serif;min-height:100vh;padding-bottom:calc(76px + var(--safe-bottom));}

/* Header */
.header{position:sticky;top:0;z-index:50;background:rgba(14,16,21,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:calc(12px + var(--safe-top)) 18px 12px;border-bottom:1px solid var(--border);}
.header h1{font-size:18px;font-weight:700;}
.header .sub{font-size:12px;color:var(--muted);margin-top:2px;}

.page{display:none;padding:16px;}
.page.active{display:block;}

/* Bottom tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(20,23,31,.95);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;padding:8px 4px calc(8px + var(--safe-bottom));}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;cursor:pointer;color:var(--muted);font-size:10px;transition:color .15s;border:none;background:none;}
.tab-item.active{color:var(--accent);}
.tab-icon{font-size:21px;line-height:1;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.card-label{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.04em;}
.card-value{font-size:22px;font-weight:700;}
.card-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-green{background:rgba(48,200,94,.15);color:var(--green);}
.badge-yellow{background:rgba(245,166,35,.15);color:var(--yellow);}
.badge-red{background:rgba(245,85,74,.15);color:var(--red);}
.badge-blue{background:rgba(66,184,245,.15);color:var(--blue);}
.badge-gray{background:rgba(122,132,153,.15);color:var(--muted);}

.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-weight:700;transition:opacity .15s;text-align:center;}
.btn:active{opacity:.7;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-danger{background:rgba(245,85,74,.12);color:var(--red);border:1px solid rgba(245,85,74,.3);}
.btn-sm{width:auto;padding:8px 16px;font-size:13px;display:inline-block;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

/* Inspection type selector */
.insp-type{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .15s;}
.insp-type:active{border-color:var(--accent);}
.insp-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.insp-title{font-size:16px;font-weight:700;}
.insp-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.insp-arrow{margin-left:auto;color:var(--muted);font-size:18px;}

/* Checklist */
.check-section{margin-bottom:8px;}
.check-section-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;user-select:none;-webkit-user-select:none;}
.check-section-head .t{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;}
.check-section-head .cnt{font-size:12px;color:var(--muted);}
.check-items{display:none;padding:4px 0 8px;}
.check-section.open .check-items{display:block;}
.check-section.open .chev{transform:rotate(90deg);}
.chev{transition:transform .15s;color:var(--muted);font-size:13px;}

.check-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin:6px 0;}
.check-item .name{flex:1;font-size:13.5px;line-height:1.4;}
.check-states{display:flex;gap:5px;flex-shrink:0;}
.cstate{width:38px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.cstate.on-ok{background:rgba(48,200,94,.2);border-color:var(--green);color:var(--green);}
.cstate.on-adj{background:rgba(245,166,35,.2);border-color:var(--yellow);color:var(--yellow);}
.cstate.on-ng{background:rgba(245,85,74,.2);border-color:var(--red);color:var(--red);}

/* Progress */
.progress-card{position:sticky;top:calc(64px + var(--safe-top));z-index:40;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:14px;}
.progress-track{background:var(--surface2);border-radius:4px;height:8px;margin-top:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#7c5cf8);border-radius:4px;transition:width .3s;}
.progress-txt{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);}

/* Forms */
.form-group{margin-bottom:14px;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:16px;outline:none;width:100%;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:none;min-height:80px;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* History list */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.hist-title{font-size:14px;font-weight:700;}
.hist-date{font-size:12px;color:var(--muted);}
.hist-stats{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}

/* Sheet (modal) */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:95;background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px calc(24px + var(--safe-bottom));max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.3,.9,.4,1);}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:17px;font-weight:700;margin-bottom:16px;}

.empty{text-align:center;padding:44px 20px;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:10px;}

.alert{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:10px;line-height:1.5;}
.alert-warning{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--yellow);}
.alert-danger{background:rgba(245,85,74,.1);border:1px solid rgba(245,85,74,.3);color:var(--red);}

.section-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:18px 0 10px;}
.note-hint{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}
</style>
</head>
<body>

<div class="header">
  <h1 id="header-title">点検管理</h1>
  <div class="sub" id="header-sub">ディーラー点検・法定点検チェック</div>
</div>

<!-- ===== HOME ===== -->
<div id="page-home" class="page active">
  <div id="home-alerts"></div>
  <div id="home-car-card"></div>
  <div class="section-label">点検を開始</div>
  <div class="insp-type" onclick="startInspection('shaken')">
    <div class="insp-icon" style="background:rgba(79,126,248,.15)">&#128663;</div>
    <div><div class="insp-title">車検（24ヶ月点検）</div><div class="insp-sub">法定56項目 — 継続検査時</div></div>
    <div class="insp-arrow">&#8250;</div>
  </div>
  <div class="insp-type" onclick="startInspection('m12')">
    <div class="insp-icon" style="background:rgba(48,200,94,.15)">&#128295;</div>
    <div><div class="insp-title">12ヶ月点検（1年点検）</div><div class="insp-sub">法定26項目</div></div>
    <div class="insp-arrow">&#8250;</div>
  </div>
  <div class="insp-type" onclick="startInspection('m6')">
    <div class="insp-icon" style="background:rgba(245,166,35,.15)">&#9881;&#65039;</div>
    <div><div class="insp-title">6ヶ月点検（半年点検）</div><div class="insp-sub">ディーラー推奨・日常点検拡充</div></div>
    <div class="insp-arrow">&#8250;</div>
  </div>
  <div class="section-label">直近の点検</div>
  <div id="home-recent"></div>
</div>

<!-- ===== INSPECT (checklist) ===== -->
<div id="page-inspect" class="page">
  <div class="progress-card">
    <div class="progress-txt"><span id="insp-name" style="font-weight:700;color:var(--text)"></span><span id="insp-progress-txt"></span></div>
    <div class="progress-track"><div class="progress-fill" id="insp-progress-fill" style="width:0%"></div></div>
    <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--muted)">
      <span><span style="color:var(--green);font-weight:700">✓</span> 良好</span>
      <span><span style="color:var(--yellow);font-weight:700">A</span> 調整・交換</span>
      <span><span style="color:var(--red);font-weight:700">×</span> 要整備</span>
    </div>
  </div>
  <div id="checklist"></div>
  <div style="margin-top:16px">
    <div class="form-group"><label>実施日</label><input type="date" id="insp-date"></div>
    <div class="form-2col">
      <div class="form-group"><label>走行距離 (km)</label><input type="number" id="insp-km" placeholder="52000"></div>
      <div class="form-group"><label>費用 (円)</label><input type="number" id="insp-cost" placeholder="15000"></div>
    </div>
    <div class="form-group"><label>実施店舗・ディーラー</label><input id="insp-shop" placeholder="例：トヨタ○○店"></div>
    <div class="form-group"><label>メモ・交換部品</label><textarea id="insp-note" placeholder="エンジンオイル・フィルター交換 など"></textarea></div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="cancelInspection()">中止</button>
      <button class="btn btn-primary" onclick="saveInspection()">保存する</button>
    </div>
  </div>
</div>

<!-- ===== HISTORY ===== -->
<div id="page-history" class="page">
  <div id="history-list"></div>
</div>

<!-- ===== CAR ===== -->
<div id="page-car" class="page">
  <div id="car-info"></div>
  <button class="btn btn-primary" onclick="openCarSheet()" style="margin-top:4px" id="car-edit-btn">車両情報を登録</button>
  <div class="section-label">次回期日の設定</div>
  <div class="card">
    <div class="form-group"><label>車検満了日</label><input type="date" id="due-shaken" onchange="saveDues()"></div>
    <div class="form-group"><label>次回12ヶ月点検</label><input type="date" id="due-m12" onchange="saveDues()"></div>
    <div class="form-group" style="margin-bottom:0"><label>次回6ヶ月点検</label><input type="date" id="due-m6" onchange="saveDues()"></div>
  </div>
  <div class="note-hint">期日を設定するとホーム画面に残り日数の警告が表示されます。</div>
</div>

<!-- Bottom tabs -->
<nav class="tabbar">
  <button class="tab-item active" onclick="go('home')"><span class="tab-icon">&#127968;</span>ホーム</button>
  <button class="tab-item" onclick="go('history')"><span class="tab-icon">&#128203;</span>履歴</button>
  <button class="tab-item" onclick="go('car')"><span class="tab-icon">&#128663;</span>車両</button>
</nav>

<!-- Car sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="car-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">車両情報</div>
  <div class="form-group"><label>車名</label><input id="c-name" placeholder="例：プリウス"></div>
  <div class="form-2col">
    <div class="form-group"><label>メーカー</label><input id="c-maker" placeholder="例：トヨタ"></div>
    <div class="form-group"><label>年式</label><input id="c-year" type="number" placeholder="2020"></div>
  </div>
  <div class="form-group"><label>ナンバープレート</label><input id="c-plate" placeholder="例：品川300あ1234"></div>
  <div class="form-group"><label>車体番号</label><input id="c-vin" placeholder="例：ZVW50-1234567"></div>
  <div class="form-2col">
    <div class="form-group"><label>色</label><input id="c-color" placeholder="例：ホワイト"></div>
    <div class="form-group"><label>走行距離 (km)</label><input id="c-km" type="number" placeholder="30000"></div>
  </div>
  <button class="btn btn-primary" onclick="saveCar()">保存</button>
</div>

<!-- History detail sheet -->
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div id="detail-body"></div>
</div>

    'エキゾーストパイプ・マフラーの取付の緩み・損傷・腐食',
    '遮熱板の取付の緩み・損傷・腐食',
  ]},
  {cat:'車枠・車体',icon:'🚗',items:[
    'フレーム・ボデーの緩み・損傷',
    '非常信号用具・発炎筒の有無・有効期限',
    'ワイパー・ウォッシャ液の状態',
    '灯火装置（ヘッドライト・ウインカー等）の作用',
  ]},
];

const ITEMS_M6 = [
  {cat:'エンジンルーム',icon:'🔧',items:[
    'エンジンオイルの量・汚れ',
    '冷却水（クーラント）の量',
    'ブレーキ液の量',
    'バッテリー液の量・端子の状態',
    'ウインドウォッシャ液の量',
    'ファンベルトの緩み・損傷',
  ]},
  {cat:'ブレーキ',icon:'🛑',items:[
    'ブレーキペダルの遊び・効き具合',
    'パーキングブレーキの引きしろ・効き具合',
    'ブレーキパッドの残量（目視）',
  ]},
  {cat:'タイヤ',icon:'🛞',items:[
    'タイヤの空気圧',
    'タイヤの亀裂・損傷・異物',
    'タイヤの溝の深さ（スリップサイン）',
    'ホイールナットの緩み',
  ]},
  {cat:'灯火・電装',icon:'💡',items:[
    'ヘッドライト・スモールランプの点灯',
    'ウインカー・ハザードの点滅',
    'ブレーキランプ・バックランプの点灯',
    'ホーンの作動',
    'ワイパー・ウォッシャの作動',
  ]},
  {cat:'その他',icon:'📋',items:[
    'エンジンのかかり具合・異音',
    'エアコンの効き',
    '下回りの油漏れ・水漏れ（目視）',
  ]},
];

const INSP_DEFS = {
  shaken:{name:'車検（24ヶ月点検）',items:ITEMS_SHAKEN,color:'blue'},
  m12:{name:'12ヶ月点検',items:ITEMS_M12,color:'green'},
  m6:{name:'6ヶ月点検',items:ITEMS_M6,color:'yellow'},
};

// ═══ State ═══
const load=k=>{try{return JSON.parse(localStorage.getItem(k));}catch{return null;}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

let car=load('mcar')||null;
let records=load('mrecords')||[];
let dues=load('mdues')||{};
let current=null; // {type, states:{}, }

// ═══ Helpers ═══
const fmt=d=>{if(!d)return'-';const[y,m,dd]=d.split('-');return`${y}/${m}/${dd}`;};
const today=()=>new Date().toISOString().slice(0,10);
function daysDiff(d){const dt=new Date(d);const t=new Date();t.setHours(0,0,0,0);return Math.round((dt-t)/86400000);}
function dueBadge(days){
  if(days<0)return`<span class="badge badge-red">期限切れ</span>`;
  if(days<=30)return`<span class="badge badge-red">残${days}日</span>`;
  if(days<=90)return`<span class="badge badge-yellow">残${days}日</span>`;
  return`<span class="badge badge-green">残${days}日</span>`;
}

// ═══ Navigation ═══
function go(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.tab-item').forEach((t,i)=>t.classList.toggle('active',['home','history','car'][i]===page));
  const titles={home:['点検管理','ディーラー点検・法定点検チェック'],history:['点検履歴','過去の点検記録'],car:['車両情報','車両と期日の管理'],inspect:['点検実施中','']};
  document.getElementById('header-title').textContent=titles[page][0];
  document.getElementById('header-sub').textContent=titles[page][1];
  if(page==='home')renderHome();
  if(page==='history')renderHistory();
  if(page==='car')renderCar();
  window.scrollTo(0,0);
}

// ═══ Home ═══
function renderHome(){
  // Alerts
  const alertsEl=document.getElementById('home-alerts');
  let alerts=[];
  const dueMap={shaken:'車検満了',m12:'12ヶ月点検',m6:'6ヶ月点検'};
  Object.entries(dueMap).forEach(([k,label])=>{
    if(dues[k]){
      const d=daysDiff(dues[k]);
      if(d<0)alerts.push(`<div class="alert alert-danger">⚠️ ${label}の期限が過ぎています（${fmt(dues[k])}）</div>`);
      else if(d<=30)alerts.push(`<div class="alert alert-warning">⚠️ ${label}まで残り${d}日（${fmt(dues[k])}）</div>`);
    }
  });
  alertsEl.innerHTML=alerts.join('');

  // Car card
  const carEl=document.getElementById('home-car-card');
  if(car){
    carEl.innerHTML=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:17px;font-weight:700">${car.name||'マイカー'}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${car.maker||''} ${car.year?car.year+'年式':''} / ${car.plate||''}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--muted)">走行距離</div>
          <div style="font-size:16px;font-weight:700">${car.km?Number(car.km).toLocaleString()+' km':'-'}</div>
        </div>
      </div>
      ${dues.shaken?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--muted)">車検満了日：${fmt(dues.shaken)}</span>${dueBadge(daysDiff(dues.shaken))}
      </div>`:''}
    </div>`;
  }else{
    carEl.innerHTML=`<div class="card" style="text-align:center;padding:20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">まず車両情報を登録しましょう</div>
      <button class="btn btn-primary btn-sm" onclick="go('car');openCarSheet()">車両を登録</button>
    </div>`;
  }

  // Recent
  const recentEl=document.getElementById('home-recent');
  const sorted=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);
  recentEl.innerHTML=sorted.length?sorted.map(histCard).join('')
    :'<div class="empty" style="padding:24px"><div style="font-size:13px">点検記録がありません</div></div>';
}

// ═══ Inspection flow ═══
function startInspection(type){
  current={type,states:{}};
  const def=INSP_DEFS[type];
  document.getElementById('insp-name').textContent=def.name;
  document.getElementById('insp-date').value=today();
  document.getElementById('insp-km').value=car?.km||'';
  document.getElementById('insp-cost').value='';
  document.getElementById('insp-shop').value='';
  document.getElementById('insp-note').value='';
  renderChecklist();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-inspect').classList.add('active');
  document.getElementById('header-title').textContent=def.name;
  document.getElementById('header-sub').textContent='各項目をタップして判定を記録';
  window.scrollTo(0,0);
}

function renderChecklist(){
  const def=INSP_DEFS[current.type];
  const el=document.getElementById('checklist');
  el.innerHTML=def.items.map((sec,si)=>{
    const done=sec.items.filter((_,ii)=>current.states[si+'-'+ii]).length;
    return`<div class="check-section${si===0?' open':''}" id="sec-${si}">
      <div class="check-section-head" onclick="toggleSection(${si})">
        <div class="t">${sec.icon} ${sec.cat}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="cnt" id="sec-cnt-${si}">${done}/${sec.items.length}</span>
          <span class="chev">&#8250;</span>
        </div>
      </div>
      <div class="check-items">
        ${sec.items.map((item,ii)=>{
          const key=si+'-'+ii;
          const st=current.states[key]||'';
          return`<div class="check-item">
            <div class="name">${item}</div>
            <div class="check-states">
              <button class="cstate${st==='ok'?' on-ok':''}" onclick="setState('${key}','ok')">✓</button>
              <button class="cstate${st==='adj'?' on-adj':''}" onclick="setState('${key}','adj')">A</button>
              <button class="cstate${st==='ng'?' on-ng':''}" onclick="setState('${key}','ng')">×</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
  updateProgress();
}

function toggleSection(si){
  document.getElementById('sec-'+si).classList.toggle('open');
}

function setState(key,val){
  current.states[key]=current.states[key]===val?'':val;
  // Update only the buttons for this item without re-render (keep sections open)
  const def=INSP_DEFS[current.type];
  const[si]=key.split('-').map(Number);
  // re-render buttons of the item
  const secEl=document.getElementById('sec-'+si);
  const items=secEl.querySelectorAll('.check-item');
  const ii=Number(key.split('-')[1]);
  const btns=items[ii].querySelectorAll('.cstate');
  const st=current.states[key];
  btns[0].className='cstate'+(st==='ok'?' on-ok':'');
  btns[1].className='cstate'+(st==='adj'?' on-adj':'');
  btns[2].className='cstate'+(st==='ng'?' on-ng':'');
  const done=def.items[si].items.filter((_,i)=>current.states[si+'-'+i]).length;
  document.getElementById('sec-cnt-'+si).textContent=done+'/'+def.items[si].items.length;
  updateProgress();
}

function updateProgress(){
  const def=INSP_DEFS[current.type];
  const total=def.items.reduce((s,sec)=>s+sec.items.length,0);
  const done=Object.values(current.states).filter(Boolean).length;
  document.getElementById('insp-progress-txt').textContent=`${done} / ${total} 項目`;
  document.getElementById('insp-progress-fill').style.width=(done/total*100)+'%';
}

function cancelInspection(){
  if(Object.keys(current.states).some(k=>current.states[k])&&!confirm('入力内容を破棄して中止しますか？'))return;
  current=null;go('home');
}

function saveInspection(){
  const def=INSP_DEFS[current.type];
  const total=def.items.reduce((s,sec)=>s+sec.items.length,0);
  const states=current.states;
  const done=Object.values(states).filter(Boolean).length;
  if(done===0){alert('少なくとも1項目は判定してください');return;}
  if(done<total&&!confirm(`未判定の項目が${total-done}件あります。このまま保存しますか？`))return;
  const rec={
    id:Date.now().toString(36),
    type:current.type,
    date:document.getElementById('insp-date').value||today(),
    km:document.getElementById('insp-km').value,
    cost:document.getElementById('insp-cost').value,
    shop:document.getElementById('insp-shop').value,
    note:document.getElementById('insp-note').value,
    states:{...states},
  };
  records.push(rec);
  save('mrecords',records);
  // Update car km
  if(rec.km&&car){car.km=rec.km;save('mcar',car);}
  current=null;
  alert('点検記録を保存しました');
  go('history');
}

// ═══ History ═══
function countStates(rec){
  const vals=Object.values(rec.states);
  return{
    ok:vals.filter(v=>v==='ok').length,
    adj:vals.filter(v=>v==='adj').length,
    ng:vals.filter(v=>v==='ng').length,
  };
}

function histCard(r){
  const def=INSP_DEFS[r.type];
  const c=countStates(r);
  return`<div class="hist-item" onclick="openDetail('${r.id}')">
    <div class="hist-top">
      <div class="hist-title">${def.name}</div>
      <div class="hist-date">${fmt(r.date)}</div>
    </div>
    <div style="font-size:12px;color:var(--muted)">${r.shop||''} ${r.km?'/ '+Number(r.km).toLocaleString()+'km':''} ${r.cost?'/ ¥'+Number(r.cost).toLocaleString():''}</div>
    <div class="hist-stats">
      <span class="badge badge-green">良好 ${c.ok}</span>
      ${c.adj?`<span class="badge badge-yellow">調整・交換 ${c.adj}</span>`:''}
      ${c.ng?`<span class="badge badge-red">要整備 ${c.ng}</span>`:''}
    </div>
  </div>`;
}

function renderHistory(){
  const el=document.getElementById('history-list');
  const sorted=[...records].sort((a,b)=>new Date(b.date)-new Date(a.date));
  el.innerHTML=sorted.length?sorted.map(histCard).join('')
    :'<div class="empty"><div class="empty-icon">📋</div><p>点検記録がありません<br>ホームから点検を開始してください</p></div>';
}

function openDetail(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  const def=INSP_DEFS[r.type];
  const stLabel={ok:'<span class="badge badge-green">良好</span>',adj:'<span class="badge badge-yellow">調整・交換</span>',ng:'<span class="badge badge-red">要整備</span>'};
  let html=`<div class="sheet-title">${def.name}<div style="font-size:12px;color:var(--muted);font-weight:400;margin-top:4px">${fmt(r.date)} ${r.shop?'/ '+r.shop:''} ${r.km?'/ '+Number(r.km).toLocaleString()+'km':''} ${r.cost?'/ ¥'+Number(r.cost).toLocaleString():''}</div></div>`;
  if(r.note)html+=`<div class="card" style="font-size:13px;line-height:1.6">${r.note}</div>`;
  def.items.forEach((sec,si)=>{
    const rows=sec.items.map((item,ii)=>{
      const st=r.states[si+'-'+ii];
      if(!st)return'';
      return`<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:12.5px;flex:1;line-height:1.4">${item}</span>${stLabel[st]}
      </div>`;
    }).filter(Boolean).join('');
    if(rows)html+=`<div style="font-size:13px;font-weight:700;margin:14px 0 4px">${sec.icon} ${sec.cat}</div>${rows}`;
  });
  html+=`<div style="margin-top:20px"><button class="btn btn-danger" onclick="deleteRecord('${r.id}')">この記録を削除</button></div>`;
  document.getElementById('detail-body').innerHTML=html;
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}

function deleteRecord(id){
  if(!confirm('この点検記録を削除しますか？'))return;
  records=records.filter(r=>r.id!==id);
  save('mrecords',records);
  closeSheet();renderHistory();
}

// ═══ Car ═══
function renderCar(){
  const el=document.getElementById('car-info');
  const btn=document.getElementById('car-edit-btn');
  if(car){
    btn.textContent='車両情報を編集';
    el.innerHTML=`<div class="card">
      <div style="font-size:18px;font-weight:700;margin-bottom:2px">${car.name||'-'}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:14px">${car.maker||''} ${car.year?car.year+'年式':''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><div class="card-label">ナンバー</div><div style="font-size:14px;font-weight:600">${car.plate||'-'}</div></div>
        <div><div class="card-label">車体番号</div><div style="font-size:13px;font-weight:600">${car.vin||'-'}</div></div>
        <div><div class="card-label">色</div><div style="font-size:14px;font-weight:600">${car.color||'-'}</div></div>
        <div><div class="card-label">走行距離</div><div style="font-size:14px;font-weight:600">${car.km?Number(car.km).toLocaleString()+' km':'-'}</div></div>
      </div>
    </div>`;
  }else{
    btn.textContent='車両情報を登録';
    el.innerHTML='<div class="empty" style="padding:24px"><div class="empty-icon">🚗</div><p>車両が未登録です</p></div>';
  }
  document.getElementById('due-shaken').value=dues.shaken||'';
  document.getElementById('due-m12').value=dues.m12||'';
  document.getElementById('due-m6').value=dues.m6||'';
}

function openCarSheet(){
  ['name','maker','year','plate','vin','color','km'].forEach(k=>{
    document.getElementById('c-'+k).value=car?.[k]||'';
  });
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('car-sheet').classList.add('open');
}

function saveCar(){
  const g=id=>document.getElementById(id).value.trim();
  if(!g('c-name')){alert('車名を入力してください');return;}
  car={name:g('c-name'),maker:g('c-maker'),year:g('c-year'),plate:g('c-plate'),vin:g('c-vin'),color:g('c-color'),km:g('c-km')};
  save('mcar',car);
  closeSheet();renderCar();
}

function saveDues(){
  dues={
    shaken:document.getElementById('due-shaken').value,
    m12:document.getElementById('due-m12').value,
    m6:document.getElementById('due-m6').value,
  };
  save('mdues',dues);
}

function closeSheet(){
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('car-sheet').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
}

// ═══ Init ═══
renderHome();
</script>
</body>
</html>
